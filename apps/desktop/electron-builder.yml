appId: com.dios.studio
productName: DIOS Studio
copyright: Copyright 2026

asar: true
asarUnpack:
  - "**/*.node"

directories:
  output: out
  buildResources: public

files:
  - dist/**/*
  - dist-electron/**/*
  - public/**/*

# Code signing requires CSC_LINK / CSC_KEY_PASSWORD (macOS) or CSC_LINK (Windows)
# environment variables. These are expected to be configured in CI only.
publish:
  provider: github
  owner: chrishoran  # Override via GH_TOKEN in CI
  repo: DIOS

win:
  target: nsis
  icon: public/icon.ico

mac:
  target: dmg
  # electron-builder auto-converts PNG to icns at build time
  icon: public/icon.png
  category: public.app-category.business

linux:
  target: AppImage
  icon: public/icon.png
  category: Office
